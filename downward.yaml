apiVersion: apps/v1
kind: Deployment
metadata:
  name: downward-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name:  nginx
        image: nginx:alpine
        command: ["/bin/sh", "-c"]
        args: ["echo \"Pod Name: $POD_NAME | Pod IP: $POD_IP\" > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
